<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingresar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f3f4f6;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrap{width:100%;max-width:380px;padding:20px;}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:32px;}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.logo-icon{width:36px;height:36px;background:#111827;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo-text{font-size:15px;font-weight:600;color:#111827;}
.logo-sub{font-size:11px;color:#9ca3af;font-family:ui-monospace,SFMono-Regular,Consolas,"Liberation Mono",monospace;}
h1{font-size:18px;font-weight:600;color:#111827;margin-bottom:4px;}
p{font-size:13px;color:#6b7280;margin-bottom:24px;}
label{display:block;font-size:12px;font-weight:500;color:#374151;margin-bottom:5px;}
input{width:100%;padding:9px 11px;border:1px solid #d1d5db;border-radius:7px;font-size:13.5px;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;outline:none;transition:.12s;margin-bottom:14px;}
input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
input::placeholder{color:#d1d5db;}
button{width:100%;padding:10px;background:#111827;color:#fff;border:none;border-radius:7px;font-size:13.5px;font-weight:500;cursor:pointer;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;transition:.12s;margin-top:4px;}
button:hover{background:#374151;}
.alert{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:10px 13px;border-radius:7px;font-size:13px;margin-bottom:16px;}
.hint{margin-top:20px;padding-top:16px;border-top:1px solid #f3f4f6;}
.hint-title{font-size:10px;font-weight:600;color:#d1d5db;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;font-family:ui-monospace,SFMono-Regular,Consolas,"Liberation Mono",monospace;}
.hint-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f9fafb;}
.hint-row:last-child{border-bottom:none;}
.hint-label{font-size:12px;color:#9ca3af;}
.hint-val{font-family:ui-monospace,SFMono-Regular,Consolas,"Liberation Mono",monospace;font-size:11px;color:#6b7280;background:#f9fafb;padding:2px 7px;border-radius:4px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🍽</div>
      <div>
        <div class="logo-text">Gestión</div>
        <div class="logo-sub">restaurante · pos</div>
      </div>
    </div>
    <h1>Ingresar al sistema</h1>
    <p>Introduce tus credenciales para continuar.</p>
    {% if error %}<div class="alert">{{ error }}</div>{% endif %}
    <form method="POST">
      <label>Usuario</label>
      <input type="text" name="username" placeholder="ej: admin" autofocus required>
      <label>Contraseña</label>
      <input type="password" name="password" placeholder="••••••••" required>
      <button type="submit">Ingresar →</button>
    </form>
    <div class="hint">
      <div class="hint-title">Acceso</div>
      <div class="hint-row">
        <span class="hint-label">Solicita tus credenciales al administrador del sistema.</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
