{% extends "base.html" %}
{% block title %}Nuevo usuario{% endblock %}
{% block page_title %}Nuevo usuario{% endblock %}
{% block content %}
<div class="page-hd">
  <div><h2>Nuevo usuario</h2><p>Crear cuenta para el equipo</p></div>
  <a href="/admin/users" class="btn btn-secondary">← Volver</a>
</div>
{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
<div class="card" style="max-width:420px">
  <form method="POST">
    <div class="form-group"><label for="username">Usuario</label><input type="text" id="username" name="username" required autofocus></div>
    <div class="form-group"><label for="password">Contraseña</label><input type="password" id="password" name="password" required><span class="form-hint">Mínimo 6 caracteres</span></div>
    <div class="form-group">
      <label for="role">Rol</label>
      <select id="role" name="role"><option value="staff">Staff</option><option value="admin">Administrador</option></select>
    </div>
    <div class="btn-group">
      <button type="submit" class="btn btn-primary">Crear usuario</button>
      <a href="/admin/users" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
