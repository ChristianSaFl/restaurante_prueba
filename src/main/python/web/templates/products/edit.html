{% extends "base.html" %}
{% block title %}Editar producto{% endblock %}
{% block page_title %}Editar producto{% endblock %}
{% block content %}
<div class="page-hd">
  <div><h2>{{ product.name }}</h2><p>Editar información</p></div>
  <a href="/products" class="btn btn-secondary">← Volver</a>
</div>
{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
<div class="card" style="max-width:480px">
  <form method="POST">
    <div class="form-row">
      <div class="form-group"><label>Nombre</label><input type="text" name="name" value="{{ product.name }}" required></div>
      <div class="form-group"><label>Precio (S/.)</label><input type="number" name="price" step="0.01" min="0.01" value="{{ product.price }}" required></div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Categoría</label>
        <select name="category">{% for c in categories %}<option {% if c==product.category %}selected{% endif %}>{{ c }}</option>{% endfor %}</select>
      </div>
      <div class="form-group">
        <label>Estado</label>
        <select name="available">
          <option value="on" {% if product.available %}selected{% endif %}>Activo</option>
          <option value="off" {% if not product.available %}selected{% endif %}>Inactivo</option>
        </select>
      </div>
    </div>
    <div class="btn-group">
      <button type="submit" class="btn btn-primary">Guardar cambios</button>
      <a href="/products" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
